<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🐾 WanWanNet 管理画面</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f5f0eb;min-height:100vh;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#fff;border-radius:20px;padding:40px 30px;width:100%;max-width:360px;box-shadow:0 8px 30px rgba(0,0,0,.12);text-align:center;}
.login-box h1{font-size:22px;color:#5d4037;margin-bottom:8px;}
.login-box p{color:#999;font-size:13px;margin-bottom:28px;}
.login-box input{width:100%;padding:14px;border:2px solid #e0d5cc;border-radius:12px;font-size:16px;margin-bottom:12px;outline:none;}
.login-box input:focus{border-color:#e8956d;}
.login-box button{width:100%;padding:14px;background:linear-gradient(135deg,#e8956d,#d4745a);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;}
.login-error{color:#e53935;font-size:13px;margin-top:8px;display:none;}
#mainScreen{display:none;}
.header{background:linear-gradient(135deg,#e8956d,#d4745a);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.header h1{font-size:18px;font-weight:800;}
.header p{font-size:12px;opacity:.85;margin-top:2px;}
.header-btns{display:flex;gap:8px;margin-top:12px;}
.btn-save{flex:1;padding:10px;background:#fff;color:#d4745a;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-logout{padding:10px 14px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:10px;font-size:13px;cursor:pointer;}
.save-status{text-align:center;padding:10px;font-size:13px;font-weight:600;display:none;}
.save-status.ok{background:#e8f5e9;color:#2e7d32;}
.save-status.err{background:#ffebee;color:#c62828;white-space:pre-wrap;font-size:11px;}
.save-status.ing{background:#fff8e1;color:#f57f17;}
.search-bar{padding:12px 16px;background:#fff;border-bottom:1px solid #ece8e4;}
.search-bar input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;}
.filter-tabs{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid #ece8e4;overflow-x:auto;}
.filter-tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:none;opacity:.5;}
.tab.active{opacity:1;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.tab.all{background:#e8956d;color:#fff;}
.tab.on-sale{background:#e8f5e9;color:#2e7d32;}
.tab.soldout{background:#ffebee;color:#c62828;}
.tab.changed{background:#fff3e0;color:#e65100;}
.product-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px;}
.product-card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;align-items:center;gap:12px;}
.product-card.soldout-card{opacity:.55;}
.product-thumb{width:52px;height:52px;border-radius:10px;background:#f5f0eb;flex-shrink:0;font-size:26px;display:flex;align-items:center;justify-content:center;}
.product-info{flex:1;min-width:0;}
.product-no{font-size:11px;color:#999;font-weight:600;}
.product-name{font-size:13px;font-weight:700;color:#3e2723;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.product-price{font-size:12px;color:#e8956d;font-weight:600;margin-top:2px;}
.product-controls{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.toggle-btn{padding:8px 12px;border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.toggle-btn.on-sale{background:#e8f5e9;color:#2e7d32;}
.toggle-btn.soldout{background:#ffebee;color:#c62828;}
.badge-select{padding:5px 6px;border:1px solid #ddd;border-radius:8px;font-size:11px;background:#fafafa;cursor:pointer;max-width:115px;}
.changed-dot{display:inline-block;width:7px;height:7px;background:#ff5722;border-radius:50%;margin-left:4px;vertical-align:middle;}
.empty{text-align:center;padding:60px 20px;color:#bbb;font-size:14px;}
.float-save{position:fixed;bottom:20px;right:16px;left:16px;background:linear-gradient(135deg,#e8956d,#d4745a);color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:800;box-shadow:0 4px 20px rgba(232,149,109,.6);cursor:pointer;z-index:200;display:none;}
.float-save.visible{display:block;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>🐾 WanWanNet</h1>
    <p>管理画面にログイン</p>
    <input type="password" id="passwordInput" placeholder="パスワード" />
    <input type="text" id="tokenInput" placeholder="GitHub Token (ghp_...)" autocomplete="off" />
    <button onclick="login()">ログイン</button>
    <div class="login-error" id="loginError">パスワードが違います</div>
  </div>
</div>

<div id="mainScreen">
  <div class="header">
    <h1>🐾 WanWanNet 管理画面</h1>
    <p id="repoInfo">読み込み中...</p>
    <div class="header-btns">
      <button class="btn-save" onclick="saveChanges()">💾 GitHubに保存して反映</button>
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </div>
  <div class="save-status" id="saveStatus"></div>
  <div class="search-bar">
    <input type="search" id="searchInput" placeholder="🔍 商品名・番号で検索..." oninput="renderList()" />
  </div>
  <div class="filter-tabs">
    <button class="tab all active" onclick="setFilter('all',this)">すべて</button>
    <button class="tab on-sale" onclick="setFilter('on-sale',this)">販売中</button>
    <button class="tab soldout" onclick="setFilter('soldout',this)">SOLD OUT</button>
    <button class="tab changed" onclick="setFilter('changed',this)">変更あり</button>
  </div>
  <div class="product-list" id="productList"></div>
</div>

<button class="float-save" id="floatSave" onclick="saveChanges()">💾 保存してサイトに反映</button>

<script>
const ADMIN_PASSWORD = 'wanwan2024';
const GITHUB_OWNER   = 'wanwannet';
const GITHUB_REPO    = 'wanwannet';
const GITHUB_FILE    = 'index.html';
const GITHUB_BRANCH  = 'main';

const BADGE_OPTIONS = {
  'null':'なし','new':'✨ NEW','pop':'👑 人気商品','re':'🔄 再入荷',
  'sale':'🏷️ 訳あり','last':'⚠️ 残り1点','hot':'🔥 大人気',
  'one':'💎 1点もの','season':'🌞 季節','deal':'🤑 お買い得',
  'outdoor':'🏕️ レジャー','few':'🔔 残り僅か','wakari':'💰 訳アリ',
  'conv':'👍 お手頃','sotsu':'🌸 しあわせの証',
  'black':'🖤 ブラックもあり','white':'🤍 ホワイトもあり',
};

let products=[], originalMap={}, changedIds=new Set();
let ghToken='', fileSha='', rawHtml='', currentFilter='all';

window.addEventListener('DOMContentLoaded',()=>{
  const t=localStorage.getItem('ww_token');
  if(t) document.getElementById('tokenInput').value=t;
});

function login(){
  const pw=document.getElementById('passwordInput').value;
  const tok=document.getElementById('tokenInput').value.trim();
  if(pw!==ADMIN_PASSWORD){document.getElementById('loginError').style.display='block';return;}
  if(!tok){alert('GitHub Tokenを入力してください');return;}
  ghToken=tok;
  localStorage.setItem('ww_token',tok);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';
  loadFromGitHub();
}

function logout(){localStorage.removeItem('ww_token');location.reload();}

async function loadFromGitHub(){
  showStatus('ing','📡 GitHubから読み込み中...');
  try{
    const res=await fetch(
      `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
      {headers:{Authorization:`token ${ghToken}`,Accept:'application/vnd.github.v3+json'}}
    );
    if(!res.ok) throw new Error('GitHub APIエラー: '+res.status);
    const data=await res.json();
    fileSha=data.sha;
    // base64デコード（TextDecoder方式で日本語対応）
    const b64 = data.content.replace(/\n/g,'');
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    rawHtml = new TextDecoder('utf-8').decode(bytes);
    document.getElementById('repoInfo').textContent=`${GITHUB_OWNER}/${GITHUB_REPO} — ${GITHUB_FILE}`;
    parseProducts();
    if(products.length===0){
      showStatus('err','⚠️ 商品0件 rawHtml長:'+rawHtml.length+'\n最初のid位置:'+rawHtml.indexOf('{id:1,'));
      return;
    }
    renderList();
    showStatus('ok',`✅ ${products.length}件の商品を読み込みました`);
    setTimeout(()=>hideStatus(),3000);
  }catch(e){
    showStatus('err','❌ エラー: '+e.message);
  }
}

// ===== ポイント：soldout:とbadge:をformNameの位置から直接検索 =====
function parseProducts(){
  products=[]; originalMap={};

  // formNameの位置を全部探す
  const nameRe = /\{id:(\d+),\s*formName:"([^"]+)"/g;
  let m;
  while((m=nameRe.exec(rawHtml))!==null){
    const id       = parseInt(m[1]);
    const formName = m[2];
    const start    = m.index;

    // この商品ブロックの終端を探す（次の{id: か ]; の直前）
    const nextId = rawHtml.indexOf('{id:', start+1);
    const end    = nextId===-1 ? rawHtml.indexOf('];', start) : nextId;
    const block  = rawHtml.slice(start, end);

    // price
    const priceM  = block.match(/price:(\d+)/);
    const price   = priceM ? parseInt(priceM[1]) : 0;
    // emoji
    const emojiM  = block.match(/emoji:"([^"]+)"/);
    const emoji   = emojiM ? emojiM[1] : '📦';
    // badge
    const badgeM  = block.match(/badge:'([^']+)'/);
    const badge   = badgeM ? badgeM[1] : null;
    // soldout
    const soldout = /soldout:true/.test(block);

    const p={id,formName,price,emoji,badge,soldout};
    products.push(p);
    originalMap[id]={soldout,badge};
  }
  products.sort((a,b)=>a.id-b.id);
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=document.getElementById('productList');
  let filtered=products.filter(p=>{
    if(q && !p.formName.toLowerCase().includes(q) && !String(p.id).includes(q)) return false;
    if(currentFilter==='on-sale') return !p.soldout;
    if(currentFilter==='soldout') return p.soldout;
    if(currentFilter==='changed') return changedIds.has(p.id);
    return true;
  });
  if(!filtered.length){
    list.innerHTML='<div class="empty">該当する商品がありません</div>';
    return;
  }
  list.innerHTML=filtered.map(p=>`
    <div class="product-card ${p.soldout?'soldout-card':''}" id="card-${p.id}">
      <div class="product-thumb">${p.emoji}</div>
      <div class="product-info">
        <div class="product-no">No.${p.id}${changedIds.has(p.id)?'<span class="changed-dot"></span>':''}</div>
        <div class="product-name">${p.formName}</div>
        <div class="product-price">¥${p.price.toLocaleString()}</div>
      </div>
      <div class="product-controls">
        <button class="toggle-btn ${p.soldout?'soldout':'on-sale'}" onclick="toggleSoldout(${p.id})">
          ${p.soldout?'🔴 SOLD OUT':'🟢 販売中'}
        </button>
        <select class="badge-select" onchange="changeBadge(${p.id},this.value)">
          ${Object.entries(BADGE_OPTIONS).map(([v,l])=>
            `<option value="${v}" ${(!p.badge&&v==='null')||(p.badge===v)?'selected':''}>${l}</option>`
          ).join('')}
        </select>
      </div>
    </div>
  `).join('');
}

function toggleSoldout(id){
  const p=products.find(x=>x.id===id);
  if(!p) return;
  p.soldout=!p.soldout;
  markChanged(id);
  renderList();
}

function changeBadge(id,val){
  const p=products.find(x=>x.id===id);
  if(!p) return;
  p.badge=val==='null'?null:val;
  markChanged(id);
}

function markChanged(id){
  const p=products.find(x=>x.id===id);
  const org=originalMap[id];
  if(p.soldout===org.soldout && p.badge===org.badge) changedIds.delete(id);
  else changedIds.add(id);
  document.getElementById('floatSave').classList.toggle('visible',changedIds.size>0);
}

async function saveChanges(){
  if(!changedIds.size){alert('変更がありません');return;}
  showStatus('ing',`⏳ ${changedIds.size}件を保存中...`);
  let updated=rawHtml;

  for(const id of changedIds){
    const p=products.find(x=>x.id===id);
    // soldout置換（formNameを使ってピンポイントで置換）
    const soldoutRe=new RegExp(`(\\{id:${id},\\s*formName:"[^"]*"[\\s\\S]*?soldout:)(true|false)(\\})`);
    updated=updated.replace(soldoutRe,(_,pre,__,suf)=>`${pre}${p.soldout}${suf}`);
    // badge置換
    const badgeVal=p.badge?`'${p.badge}'`:'null';
    const badgeRe=new RegExp(`(\\{id:${id},\\s*formName:"[^"]*"[\\s\\S]*?badge:)(?:'[^']*'|null)`);
    updated=updated.replace(badgeRe,(_,pre)=>`${pre}${badgeVal}`);
  }

  try{
    const encoded=btoa(unescape(encodeURIComponent(updated)));
    const res=await fetch(
      `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`,
      {
        method:'PUT',
        headers:{Authorization:`token ${ghToken}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
        body:JSON.stringify({
          message:`🛒 商品管理更新 (${[...changedIds].map(id=>'No.'+id).join(', ')})`,
          content:encoded,
          sha:fileSha,
          branch:GITHUB_BRANCH,
        }),
      }
    );
    if(!res.ok){const e=await res.json();throw new Error(e.message||res.status);}
    const data=await res.json();
    fileSha=data.content.sha;
    rawHtml=updated;
    for(const id of changedIds){
      const p=products.find(x=>x.id===id);
      originalMap[id]={soldout:p.soldout,badge:p.badge};
    }
    changedIds.clear();
    document.getElementById('floatSave').classList.remove('visible');
    showStatus('ok','✅ 保存完了！サイトに反映されました 🎉');
    setTimeout(()=>hideStatus(),5000);
  }catch(e){
    showStatus('err','❌ 保存失敗:\n'+e.message);
  }
}

function showStatus(type,msg){
  const el=document.getElementById('saveStatus');
  el.className='save-status '+type;
  el.textContent=msg;
  el.style.display='block';
}
function hideStatus(){document.getElementById('saveStatus').style.display='none';}
</script>
</body>
</html>
